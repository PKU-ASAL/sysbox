name: Release

concurrency:
  group: sysbox-stable-release
  cancel-in-progress: false

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate release tag and source
        run: |
          source scripts/release/lib.sh
          require_release_repo "${GITHUB_REF_NAME}"
      - name: Full CI gate
        run: |
          go vet ./...
          go test ./...
          CGO_ENABLED=1 go test -race ./pkg/buildinfo ./cmd/sysbox/commands ./pkg/runtime ./pkg/state ./pkg/provider/docker ./pkg/provider/libvirt ./pkg/provider/firecracker
          make ci
          make release-test
          make release-workflow-test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      OCI_IMAGE: ghcr.io/pku-asal/sysbox
      CLI_OCI_IMAGE: ghcr.io/pku-asal/sysbox-cli
      METADATA_OCI_IMAGE: ghcr.io/pku-asal/sysbox-metadata
      SOURCE_URL: https://github.com/PKU-ASAL/sysbox
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - name: Registry login and OCI preflight
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -n "${GHCR_TOKEN}"
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          scripts/release/oci.sh preflight --tag "${GITHUB_REF_NAME}" --image "${OCI_IMAGE}" --metadata-field oci_digest
          scripts/release/oci.sh preflight --tag "${GITHUB_REF_NAME}" --image "${CLI_OCI_IMAGE}" --dockerfile Dockerfile.cli --metadata-field cli_oci_digest
          scripts/release/oci.sh preflight --tag "${GITHUB_REF_NAME}" --image "${METADATA_OCI_IMAGE}" --dockerfile Dockerfile.metadata --metadata-field metadata_oci_digest
      - name: Build and verify release artifacts
        run: |
          scripts/release/build.sh --tag "${GITHUB_REF_NAME}" --output dist
          scripts/release/verify.sh dist
      - name: Publish and verify runtime OCI image
        env:
          BUILD_METADATA: dist/build-metadata.json
        run: scripts/release/oci.sh build --tag "${GITHUB_REF_NAME}" --image "${OCI_IMAGE}" --metadata-field oci_digest
      - name: Publish and verify CLI OCI image
        env:
          BUILD_METADATA: dist/build-metadata.json
        run: scripts/release/oci.sh build --tag "${GITHUB_REF_NAME}" --image "${CLI_OCI_IMAGE}" --dockerfile Dockerfile.cli --metadata-field cli_oci_digest
      - name: Publish durable release metadata OCI image
        env:
          BUILD_METADATA: dist/build-metadata.json
        run: scripts/release/oci.sh build --tag "${GITHUB_REF_NAME}" --image "${METADATA_OCI_IMAGE}" --dockerfile Dockerfile.metadata --metadata-field metadata_oci_digest
      - name: Logout from registry
        if: always()
        run: docker logout ghcr.io || true
