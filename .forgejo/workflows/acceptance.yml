name: Protected Acceptance

on:
  workflow_dispatch:
    inputs:
      tier:
        description: Acceptance tier to run
        required: true
        type: choice
        options:
          - privileged
          - heterogeneous-matrix
          - heterogeneous-reset

jobs:
  acceptance:
    runs-on: [self-hosted, linux, release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run protected acceptance
        run: |
          case "${{ inputs.tier }}" in
            privileged) make test-privileged-container ;;
            heterogeneous-matrix) make test-heterogeneous-matrix ;;
            heterogeneous-reset) make test-heterogeneous-reset ;;
            *) echo "unknown acceptance tier" >&2; exit 2 ;;
          esac
