services:
  sysbox-postgres:
    image: postgres:16-alpine
    container_name: sysbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SYSBOX_POSTGRES_DB:-sysbox}
      POSTGRES_USER: ${SYSBOX_POSTGRES_USER:-sysbox}
      POSTGRES_PASSWORD: ${SYSBOX_POSTGRES_PASSWORD:-sysbox}
    ports:
      - "${SYSBOX_POSTGRES_PORT:-55432}:5432"
    volumes:
      - sysbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  sysbox-api:
    build: .
    image: sysbox:latest
    container_name: sysbox-api
    restart: unless-stopped
    depends_on:
      sysbox-postgres:
        condition: service_healthy
    ports:
      - "${SYSBOX_API_PORT:-9876}:9876"
    volumes:
      # Docker substrate: talk to the host Docker daemon.
      - ${SYSBOX_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      # API-owned workspaces, state, and job metadata.
      - ${SYSBOX_DATA_DIR:-./data}:${SYSBOX_HOME:-/var/lib/sysbox}
      # Shared artifact cache (kernels, rootfs, qcow2, downloaded tools).
      - ${SYSBOX_CACHE_DIR:-~/.cache/sysbox}:${SYSBOX_CACHE:-/var/cache/sysbox}
    environment:
      SYSBOX_API_LISTEN: ${SYSBOX_API_LISTEN:-:9876}
      SYSBOX_API_TOKEN: ${SYSBOX_API_TOKEN:-}
      SYSBOX_HOME: ${SYSBOX_HOME:-/var/lib/sysbox}
      SYSBOX_CACHE: ${SYSBOX_CACHE:-/var/cache/sysbox}
      SYSBOX_STATE_BACKEND: ${SYSBOX_STATE_BACKEND:-postgres://sysbox:sysbox@sysbox-postgres:5432/sysbox?sslmode=disable&topology={topology}}
      SYSBOX_SUPERVISOR_POLICY: ${SYSBOX_SUPERVISOR_POLICY:-observe_only}
      SYSBOX_SUPERVISOR_INTERVAL: ${SYSBOX_SUPERVISOR_INTERVAL:-30s}
      PATH: /opt/sysbox/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

volumes:
  sysbox-postgres-data:
