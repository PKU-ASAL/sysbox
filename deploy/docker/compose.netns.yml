services:
  sysbox-api:
    # Required for real Linux netns/veth/tap topologies. Keep this opt-in so
    # the default API deployment can run as an ordinary containerized service.
    privileged: true
    network_mode: host
    pid: host
    ports: !reset []
    environment:
      SYSBOX_STATE_BACKEND: ${SYSBOX_STATE_BACKEND:-postgres://${SYSBOX_POSTGRES_USERNAME:-sysbox}:${SYSBOX_POSTGRES_PASSWORD}@127.0.0.1:${SYSBOX_POSTGRES_HOST_PORT:-55432}/${SYSBOX_POSTGRES_DATABASE:-sysbox}?sslmode=disable&topology={topology}}
