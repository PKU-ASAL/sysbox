services:
  sysbox-postgres:
    image: postgres:16-alpine
    container_name: sysbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SYSBOX_POSTGRES_DATABASE:-sysbox}
      POSTGRES_USER: ${SYSBOX_POSTGRES_USERNAME:-sysbox}
      POSTGRES_PASSWORD: ${SYSBOX_POSTGRES_PASSWORD:-change-me}
    ports:
      - "${SYSBOX_POSTGRES_HOST_ADDR:-127.0.0.1}:${SYSBOX_POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - sysbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  sysbox-api:
    build: .
    image: sysbox:latest
    container_name: sysbox-api
    restart: unless-stopped
    depends_on:
      sysbox-postgres:
        condition: service_healthy
    ports:
      - "${SYSBOX_API_HOST_ADDR:-0.0.0.0}:${SYSBOX_API_HOST_PORT:-9876}:9876"
    volumes:
      # API-owned workspaces and control-plane metadata.
      - ${SYSBOX_HOST_HOME_DIR:-.sysbox/api}:/var/lib/sysbox
      # Shared artifact cache metadata. Execution agents mount the same path.
      - ${SYSBOX_HOST_CACHE_DIR:-~/.cache/sysbox}:/var/cache/sysbox
      - ./deploy/docker/sysbox.yaml:/etc/sysbox/sysbox.yaml:ro
    environment:
      SYSBOX_CONFIG: ${SYSBOX_CONFIG:-/etc/sysbox/sysbox.yaml}
      SYSBOX_API_TOKEN: ${SYSBOX_API_TOKEN:-}
      SYSBOX_STATE_BACKEND: ${SYSBOX_STATE_BACKEND:-postgres://${SYSBOX_POSTGRES_USERNAME:-sysbox}:${SYSBOX_POSTGRES_PASSWORD:-change-me}@sysbox-postgres:5432/${SYSBOX_POSTGRES_DATABASE:-sysbox}?sslmode=disable&topology={topology}}
      PATH: /opt/sysbox/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

volumes:
  sysbox-postgres-data:
