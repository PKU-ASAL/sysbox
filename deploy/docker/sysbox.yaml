version: 1

api:
  listen: ":9876"

paths:
  home: /var/lib/sysbox
  cache: /var/cache/sysbox
  workspaces_dir: /var/lib/sysbox/workspaces
  runs_dir: /var/lib/sysbox/runs

supervisor:
  policy: observe_only
  interval: 30s

providers:
  default_policy:
    preflight: warn
  docker:
    enabled: true
  network:
    enabled: true
  firecracker:
    enabled: true
    binary: /opt/sysbox/bin/firecracker
    workdir: /var/lib/sysbox/firecracker
  libvirt:
    enabled: true

artifacts:
  roots:
    - /var/cache/sysbox
  policy:
    cache_mode: on_demand
    verify: warn
  registries: []
