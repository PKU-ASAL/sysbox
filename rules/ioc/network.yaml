- id: "ioc-net-ssh-outbound"
  name: "Outbound SSH connection (lateral movement)"
  ttp: "T1021.004"
  event: connect
  match:
    args.remote_port: 22

- id: "ioc-net-common-ports"
  name: "Connection to common attack target ports"
  ttp: "T1595"
  event: connect
  match:
    args.remote_port: [21, 23, 25, 110, 143, 445, 3389, 5900]
