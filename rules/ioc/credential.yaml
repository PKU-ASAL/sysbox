- id: "ioc-cred-shadow"
  name: "Shadow file access"
  ttp: "T1003"
  event: openat
  match:
    args.pathname: ["/etc/shadow"]

- id: "ioc-cred-ssh-key"
  name: "SSH private key access"
  ttp: "T1552.004"
  event: openat
  match:
    args.pathname: ["/root/.ssh/id_rsa", "/root/.ssh/id_ed25519", "/home/*/.ssh/id_rsa"]

- id: "ioc-cred-passwd"
  name: "Passwd file access"
  ttp: "T1003"
  event: openat
  match:
    args.pathname: ["/etc/passwd"]
