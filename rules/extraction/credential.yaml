- id: "ext-shadow-dump"
  match:
    command_contains: ["cat /etc/shadow", "unshadow", "john", "hashcat"]
  predict:
    - event: openat
      args: {pathname: "/etc/shadow"}
  ttp: "T1003"

- id: "ext-ssh-key-read"
  match:
    command_contains: [".ssh/id_rsa", ".ssh/id_ed25519", "authorized_keys"]
  predict:
    - event: openat
      args: {pathname_prefix: "/root/.ssh"}
  ttp: "T1552.004"

- id: "ext-env-dump"
  match:
    command_contains: ["env", "printenv", "/proc/self/environ"]
  predict:
    - event: openat
      args: {pathname: "/proc/self/environ"}
  ttp: "T1552"
